<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Todo App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>✨ Smart Todo</h1>

    <div class="top-bar">
      <button id="themeToggle">🌙</button>
    </div>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Tambah tugas...">
      <button onclick="addTask()">+</button>
    </div>

    <div class="filters">
      <button onclick="filterTasks('all', event)">All</button>
      <button onclick="filterTasks('active', event)">Active</button>
      <button onclick="filterTasks('done', event)">Done</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
